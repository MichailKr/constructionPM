version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: constructionpm_db
    environment:
      POSTGRES_USER: constructionpm
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: constructionpm
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constructionpm -d constructionpm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: constructionpm_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data: